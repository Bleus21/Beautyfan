name: Beautyfan Reposter

on:
  workflow_dispatch:
  schedule:
    - cron: "20 * * * *"   # elk uur op :20, pas aan als je wilt

permissions:
  contents: write

concurrency:
  group: beautyfan-reposter
  cancel-in-progress: false

jobs:
  repost:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Debug env presence
        run: |
          echo "BSKY_USERNAME set: ${BSKY_USERNAME:+yes}"
          echo "BSKY_PASSWORD set: ${BSKY_PASSWORD:+yes}"
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_BEAUTYFAN }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_BEAUTYFAN }}

      - name: Run Beautyfan bot
        run: python -u beautyfan_reposter.py
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_BEAUTYFAN }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_BEAUTYFAN }}
          STATE_FILE: state_beautyfan.json

      - name: Commit updated state
        run: |
          if git status --porcelain | grep -qE "state_beautyfan\.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add state_beautyfan.json
            git commit -m "Update beautyfan state"

            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          else
            echo "No state changes to commit."
          fi