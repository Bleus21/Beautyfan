name: Beautyfan Reposter

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beautyfan-state
  cancel-in-progress: false

jobs:
  repost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install atproto

      - name: Run beautyfan script
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          STATE_FILE: state_beautyfan.json
        run: python -u beautyfan_reposter.py

      - name: Commit and push state
        run: |
          if git status --porcelain | grep -qE "^.M state_beautyfan\.json|^\?\? state_beautyfan\.json|^M  state_beautyfan\.json|^A  state_beautyfan\.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com]"

            git add state_beautyfan.json
            git commit -m "Update beautyfan state"

            git pull --rebase origin main
            git push origin main
          else
            echo "No state changes to commit."
          fi